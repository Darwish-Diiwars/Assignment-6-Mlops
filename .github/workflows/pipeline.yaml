name: Assignment 6 Gatekeeper Pipeline

on:
  push:
    branches:
      - "**"

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run lightweight linter
        run: |
          echo "Running linter..."
          # Replace this with your real lint command if you have one
          # Example:
          # pip install flake8
          # flake8 .
          echo "Linter passed."

  train:
    needs: linter
    runs-on: ubuntu-latest
    if: ${{ needs.linter.result == 'success' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-train]') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run expensive training job
        run: |
          echo "Starting expensive training..."
          # Replace this with your actual training command
          # Example:
          # python train.py
          exit 1 

      - name: Create error log file if training fails
        if: ${{ failure() }}
        run: |
          echo "Training job failed." > error_logs.txt
          echo "Check training script, dependencies, or runtime configuration." >> error_logs.txt

      - name: Upload error logs artifact
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: training-error-logs
          path: error_logs.txt

      - name: Cleanup temporary resources
        if: ${{ always() }}
        run: echo "Cleaning up temporary cloud volumes..."
